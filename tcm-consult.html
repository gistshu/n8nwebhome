<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>n8n 中醫診斷用藥建議(醫師使用) v0.1</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #0d5f59;
      --border: #d1d5db;
      --ok: #166534;
      --err: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .card {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      background: var(--card);
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    .site-title {
      margin: 0;
      padding: 20px 24px 12px;
      font-size: 1.35rem;
      font-weight: 800;
      white-space: nowrap;
      border-bottom: 1px solid #e5e7eb;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .desc {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      line-height: 1.5;
      font-family: inherit;
    }

    input {
      height: 48px;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 75px;
      resize: vertical;
    }

    #ask-form {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .timer {
      font-size: 0.95rem;
      color: var(--muted);
      min-width: 96px;
      font-variant-numeric: tabular-nums;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      min-height: 1.4em;
    }

    .ok {
      color: var(--ok);
    }

    .err {
      color: var(--err);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 20% 60% 20%;
      gap: 0;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      height: 100%;
    }

    .left-pane,
    .result-pane,
    .history-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      padding: 16px;
      overflow: hidden;
    }

    .left-pane,
    .result-pane {
      border-right: 1px solid #e5e7eb;
    }

    .pane-title {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 700;
    }

    .left-pane textarea {
      flex: 0 0 auto;
      min-height: 40%;
      height: 40%;
      max-height: none;
    }

    .response-box {
      width: 100%;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      font-size: 1rem;
      line-height: 1.5;
      font-family: inherit;
      background: linear-gradient(180deg, #f8fbff 0%, #eef8f3 100%);
      color: #14532d;
      overflow-y: auto;
      display: grid;
      gap: 14px;
    }

    .response-box button {
      font: inherit;
    }

    .result-section {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #cfe7db;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .result-section h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #0f3f3a;
    }

    .result-content {
      margin: 0;
      color: #14532d;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .source-ref {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 2px;
      padding: 1px 7px;
      border: 1px solid #8dd3c7;
      border-radius: 999px;
      background: #ecfdf5;
      color: #0f766e;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
    }

    .source-ref:hover {
      background: #d1fae5;
    }

    .result-empty {
      color: var(--muted);
    }

    .history-list {
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 8px;
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .history-item {
      margin-bottom: 8px;
    }

    .history-button {
      width: 100%;
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid #dbe3ea;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.35;
      text-align: left;
    }

    .history-button small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .history-button:hover,
    .history-button.active {
      background: #e6f5f2;
      border-color: var(--accent);
      color: #0f3f3a;
    }

    .history-empty {
      margin: 0;
      padding: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .source-modal[hidden] {
      display: none;
    }

    .source-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.45);
    }

    .source-modal-dialog {
      width: min(900px, 100%);
      max-height: min(80vh, 900px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .source-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .source-modal-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      color: #0f172a;
    }

    .source-modal-close {
      min-width: 40px;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 999px;
    }

    .source-modal-body {
      padding: 20px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      color: #1f2937;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    @media (max-width: 900px) {
      .card {
        width: 100vw;
        max-width: 100vw;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .content-grid {
        grid-template-columns: 1fr;
        height: auto;
      }

      .site-title {
        white-space: normal;
      }

      .left-pane textarea {
        min-height: 22vh;
        height: auto;
        max-height: none;
      }

      .response-box,
      .history-list {
        min-height: 45vh;
      }

      .source-modal {
        padding: 12px;
      }

      .source-modal-dialog {
        max-height: 88vh;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1 class="site-title">n8n 中醫診斷用藥建議(醫師使用) v0.1</h1>

    <form id="ask-form">
      <div class="content-grid">
        <section class="left-pane">
          <label for="doctor-name">醫師姓名</label>
          <input id="doctor-name" name="doctorName" type="text" placeholder="請輸入醫師姓名" autocomplete="name" required />
          <label for="question">請輸入 問診資訊(S/O)</label>
          <textarea id="question" name="question" placeholder="請輸入問診資訊..." required>34歲，女性，不孕三年，無IVF經驗</textarea>
          <div class="actions">
            <button id="submit-btn" type="submit">查詢</button>
            <span id="timer" class="timer" aria-live="polite">0.0 秒</span>
          </div>
          <p id="status" class="status"></p>
        </section>

        <section class="result-pane">
          <p class="pane-title">AI 資料庫RAG查詢</p>
          <div id="response" class="response-box">
          </div>
        </section>

        <section class="history-pane">
          <p class="pane-title">查詢紀錄</p>
          <ol id="history-list" class="history-list" aria-label="最近10筆查詢紀錄">
            <li class="history-empty">查詢後會顯示此醫師最近10筆紀錄。</li>
          </ol>
        </section>
      </div>
    </form>
  </main>

  <div id="source-modal" class="source-modal" hidden>
    <div class="source-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="source-modal-title">
      <div class="source-modal-header">
        <h2 id="source-modal-title" class="source-modal-title">來源內容</h2>
        <button id="source-modal-close" class="source-modal-close" type="button" aria-label="關閉">關閉</button>
      </div>
      <div id="source-modal-body" class="source-modal-body">讀取中...</div>
    </div>
  </div>

  <script>
    const appApiBaseUrl = `${window.location.origin}/api/tcm-consult`;
    const form = document.getElementById("ask-form");
    const doctorNameInput = document.getElementById("doctor-name");
    const questionInput = document.getElementById("question");
    const submitBtn = document.getElementById("submit-btn");
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");
    const responseEl = document.getElementById("response");
    const historyListEl = document.getElementById("history-list");
    const sourceModalEl = document.getElementById("source-modal");
    const sourceModalTitleEl = document.getElementById("source-modal-title");
    const sourceModalBodyEl = document.getElementById("source-modal-body");
    const sourceModalCloseEl = document.getElementById("source-modal-close");
    const defaultQuestion = questionInput.value;
    const backendUnavailableMessage = "後端AI模型尚未啟動，請洽資訊部";
    const defaultReply = `真的很抱歉妳已經辛苦嘗試多年了，我用診所現有紀錄幫妳把可參考的調理方向簡短整理，並想再問兩個問題以利後續幫妳安排較個人化的建議（參考編號：1991、1228、1990、1298）。

簡短可參考調理項目（紀錄中曾使用）：
- 飲食/生活：忌口甜食、冰品、油炸食物；有紀錄建議「早上喝一包」作為日常調理（1991、1990、1298）。
- 中藥飲方：玉容清飲（7包/天）、甘露飲A（5包/天）、B方／宮寒方（1包/天）（1991、1298、1990）。
- 補充/丸劑：薑辣素（記載20顆）、優子芄膠囊（記載20顆，記錄中為一天2次的用法）（1228）。
- 物理療法：特殊針灸、薰蒸等單次療程；紀錄中在植入/試管相關時也有搭配使用（1990）。

為了給妳更適合的建議，請簡短回覆兩個問題（只需一句話）：
1. 妳做過哪些檢查或檢驗？（例如AMH、輸卵管攝影HSG、子宮超音波、或配偶的精液檢查等）
2. 妳目前是否想嘗試試管/植入，或現在有在服用任何生殖相關藥物？

如果妳想要我們安排更詳細的諮詢或由專人說明可搭配的療程與流程，歡迎留下電話或 Line，我們會安排聯絡（參考編號：1991、1228、1990、1298）。`;

    const sessionStorageKey = "n8n_session_tcm_consult";
    const doctorNameStorageKey = "n8n_tcm_doctor_name";
    let timerIntervalId = null;
    let timerStartedAt = 0;
    let fixedTimerSeconds = null;
    let historyRecords = [];
    let lastFocusedSourceButton = null;
    let sessionId = localStorage.getItem(sessionStorageKey);
    if (!sessionId) {
      sessionId = "sid-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(sessionStorageKey, sessionId);
    }

    doctorNameInput.value = localStorage.getItem(doctorNameStorageKey) || "";

    doctorNameInput.addEventListener("change", () => {
      const doctorName = doctorNameInput.value.trim();
      localStorage.setItem(doctorNameStorageKey, doctorName);
      if (!doctorName) {
        historyRecords = [];
        renderHistory();
        return;
      }

      loadDoctorHistory(doctorName);
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const doctorName = doctorNameInput.value.trim();
      const question = questionInput.value.trim();
      if (!doctorName) {
        statusEl.textContent = "請先輸入醫師姓名。";
        statusEl.className = "status err";
        doctorNameInput.focus();
        return;
      }

      if (!question) {
        statusEl.textContent = "請先輸入問診資訊。";
        statusEl.className = "status err";
        questionInput.focus();
        return;
      }

      localStorage.setItem(doctorNameStorageKey, doctorName);
      submitBtn.disabled = true;
      statusEl.textContent = "傳送中...";
      statusEl.className = "status";
      startTimer();
      try {
        const response = await fetch(appApiBaseUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            doctorName,
            question,
            sessionId,
            sentAt: new Date().toISOString()
          })
        });

        const text = await response.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (_e) {
          data = null;
        }

        if (!response.ok) {
          const errorMessage = data && typeof data === "object" && data.error
            ? data.error
            : `HTTP ${response.status}: ${text || "Unknown error"}`;
          throw new Error(errorMessage);
        }

        statusEl.className = "status ok";

        if (data && typeof data === "object" && "reply" in data) {
          const reply = String(data.reply ?? "");
          setTimer(data.durationSeconds);
          updateHistoryRecords(data.history);

          if (data.success) {
            renderReply(reply);
            statusEl.textContent = "送出成功，已收到 n8n 回覆。";
          } else {
            if (reply === backendUnavailableMessage) {
              statusEl.textContent = backendUnavailableMessage;
            } else {
              renderReply(reply);
              statusEl.textContent = "n8n 回傳 success=false。";
            }
            statusEl.className = "status err";
          }
        } else {
          const reply = text || "(系統無回傳內容)";
          renderReply(reply);
          setTimer();
          await loadDoctorHistory(doctorName);
          statusEl.textContent = "送出成功。";
        }
      } catch (error) {
        statusEl.textContent = `送出失敗：${error.message}`;
        statusEl.className = "status err";
        renderReply(`送出失敗：${error.message}`);
      } finally {
        stopTimer();
        submitBtn.disabled = false;
      }
    });

    function renderReply(reply) {
      const parsed = parseReplySections(reply);
      responseEl.innerHTML = "";
      responseEl.appendChild(createResultSection("診斷建議（Assessment／評估）", parsed.assessment));
      responseEl.appendChild(createResultSection("用藥方案建議（Plan／計畫）", normalizeMedicationPlan(parsed.medicationPlan)));
      responseEl.appendChild(createResultSection("調養方案建議（Plan／計畫）", parsed.carePlan));
      responseEl.scrollTop = 0;
    }

    function createResultSection(title, content) {
      const section = document.createElement("section");
      section.className = "result-section";

      const heading = document.createElement("h3");
      heading.textContent = title;

      const body = document.createElement("div");
      body.className = "result-content";
      if (content) {
        body.innerHTML = formatReplyContent(content);
      } else {
        body.textContent = "目前尚無對應內容。";
        body.classList.add("result-empty");
      }

      section.appendChild(heading);
      section.appendChild(body);
      return section;
    }

    function parseReplySections(reply) {
      const sourceText = String(reply || "").trim();
      if (!sourceText) {
        return {
          assessment: "",
          medicationPlan: "",
          carePlan: ""
        };
      }

      const normalizedText = sourceText.replace(/\r\n/g, "\n");
      const headingPatterns = [
        {
          key: "assessment",
          pattern: /(?:^|\n)\s*(?:#{1,6}\s*)?(?:診斷建議|assessment(?:\s*\/\s*評估|\s*／\s*評估)?|評估)(?:\s*[（(][^)\n）]*[)）])?\s*[:：]?\s*(?=\n|$)/ig
        },
        {
          key: "medicationPlan",
          pattern: /(?:^|\n)\s*(?:#{1,6}\s*)?(?:用藥方案建議|用藥建議|plan(?:\s*\/\s*計畫|\s*／\s*計畫)?\s*[（(]?\s*用藥[)）]?|藥物計畫)(?:\s*[（(][^)\n）]*[)）])?\s*[:：]?\s*(?=\n|$)/ig
        },
        {
          key: "carePlan",
          pattern: /(?:^|\n)\s*(?:#{1,6}\s*)?(?:調養方案建議|調養建議|plan(?:\s*\/\s*計畫|\s*／\s*計畫)?\s*[（(]?\s*調養[)）]?|調理計畫|生活調養)(?:\s*[（(][^)\n）]*[)）])?\s*[:：]?\s*(?=\n|$)/ig
        }
      ];

      const matches = [];
      headingPatterns.forEach(({ key, pattern }) => {
        const match = pattern.exec(normalizedText);
        if (match) {
          matches.push({
            key,
            start: match.index,
            end: pattern.lastIndex
          });
        }
      });

      if (matches.length) {
        matches.sort((a, b) => a.start - b.start);
        const sections = {
          assessment: "",
          medicationPlan: "",
          carePlan: ""
        };

        matches.forEach((match, index) => {
          const nextStart = index + 1 < matches.length ? matches[index + 1].start : normalizedText.length;
          sections[match.key] = normalizedText.slice(match.end, nextStart).trim();
        });

        const usedRanges = matches.map((match, index) => {
          const nextStart = index + 1 < matches.length ? matches[index + 1].start : normalizedText.length;
          return normalizedText.slice(match.start, nextStart);
        }).join("\n").trim();

        if (!sections.assessment && normalizedText !== usedRanges) {
          sections.assessment = normalizedText.replace(usedRanges, "").trim();
        }

        return sections;
      }

      return fallbackReplySections(normalizedText);
    }

    function fallbackReplySections(text) {
      const blocks = text
        .split(/\n\s*\n/)
        .map((block) => block.trim())
        .filter(Boolean);

      const sections = {
        assessment: "",
        medicationPlan: "",
        carePlan: ""
      };

      blocks.forEach((block) => {
        const bucket = classifyReplyBlock(block);
        sections[bucket] = sections[bucket]
          ? `${sections[bucket]}\n\n${block}`
          : block;
      });

      if (sections.assessment || sections.medicationPlan || sections.carePlan) {
        if (!sections.assessment && blocks[0]) {
          sections.assessment = blocks[0];
        }

        if (!sections.carePlan && sections.medicationPlan) {
          sections.carePlan = sections.medicationPlan;
        }

        return sections;
      }

      if (blocks.length >= 3) {
        return {
          assessment: blocks[0],
          medicationPlan: blocks.slice(1, blocks.length - 1).join("\n\n"),
          carePlan: blocks[blocks.length - 1]
        };
      }

      if (blocks.length === 2) {
        return {
          assessment: blocks[0],
          medicationPlan: blocks[1],
          carePlan: blocks[1]
        };
      }

      return {
        assessment: text,
        medicationPlan: "",
        carePlan: ""
      };
    }

    function classifyReplyBlock(block) {
      const text = String(block);

      if (/(玉容清飲|甘露飲|宮寒方|中藥|藥方|處方|膠囊|丸劑|藥物|針灸|薰蒸)/.test(text)) {
        return "medicationPlan";
      }

      if (/(飲食|作息|生活|忌口|調理|調養|運動|睡眠|追蹤|回診|安排聯絡|留下電話|留下line|留下 Line)/i.test(text)) {
        return "carePlan";
      }

      return "assessment";
    }

    function normalizeMedicationPlan(content) {
      return String(content || "")
        .replace(/藥品[／/]方劑\s*[:：]\s*/gi, "")
        .trim();
    }

    function formatReplyContent(content) {
      return escapeHtml(String(content || ""))
        .replace(/\n/g, "<br>")
        .replace(/(?<![\w>])(\d{3,6})(?![\w<])/g, (_, sourceId) => {
          return `<button type="button" class="source-ref" data-source-id="${sourceId}">${sourceId}</button>`;
        });
    }

    responseEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".source-ref");
      if (!button) {
        return;
      }

      const sourceId = button.dataset.sourceId;
      if (!sourceId) {
        return;
      }

      lastFocusedSourceButton = button;
      openSourceModal(sourceId);
      sourceModalBodyEl.textContent = `正在讀取編號 ${sourceId} 的內容...`;

      try {
        const response = await fetch(`${appApiBaseUrl}/source?sourceId=${encodeURIComponent(sourceId)}`);
        const rawText = await response.text();
        let data = null;

        try {
          data = rawText ? JSON.parse(rawText) : null;
        } catch (_error) {
          data = null;
        }

        if (!response.ok) {
          throw new Error(data && data.error ? data.error : `HTTP ${response.status}`);
        }

        if (!data || typeof data !== "object") {
          throw new Error("來源 API 尚未啟用，請重新啟動 app.py");
        }

        const source = data.source || {};
        sourceModalTitleEl.textContent = `來源編號 ${source.documentId || source.id || sourceId}`;
        sourceModalBodyEl.textContent = String(source.text || "此來源沒有文字內容。");
      } catch (error) {
        sourceModalTitleEl.textContent = `來源編號 ${sourceId}`;
        sourceModalBodyEl.textContent = `讀取失敗：${error.message}`;
      }
    });

    sourceModalCloseEl.addEventListener("click", closeSourceModal);

    sourceModalEl.addEventListener("click", (event) => {
      if (event.target === sourceModalEl) {
        closeSourceModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !sourceModalEl.hidden) {
        closeSourceModal();
      }
    });

    function openSourceModal(sourceId) {
      sourceModalTitleEl.textContent = `來源編號 ${sourceId}`;
      sourceModalEl.hidden = false;
      document.body.style.overflow = "hidden";
    }

    function closeSourceModal() {
      sourceModalEl.hidden = true;
      document.body.style.overflow = "";
      if (lastFocusedSourceButton) {
        lastFocusedSourceButton.focus();
      }
    }

    function startTimer() {
      stopTimer();
      fixedTimerSeconds = null;
      timerStartedAt = Date.now();
      updateTimer();
      timerIntervalId = window.setInterval(updateTimer, 100);
    }

    function stopTimer() {
      if (timerIntervalId) {
        window.clearInterval(timerIntervalId);
        timerIntervalId = null;
      }

      if (timerStartedAt) {
        if (typeof fixedTimerSeconds === "number" && Number.isFinite(fixedTimerSeconds)) {
          timerEl.textContent = `${fixedTimerSeconds.toFixed(1)} 秒`;
        } else {
          updateTimer();
        }
      }

      timerStartedAt = 0;
    }

    function updateTimer() {
      if (!timerStartedAt) {
        timerEl.textContent = "0.0 秒";
        return;
      }

      const elapsedSeconds = (Date.now() - timerStartedAt) / 1000;
      timerEl.textContent = `${elapsedSeconds.toFixed(1)} 秒`;
    }

    function updateHistoryRecords(records) {
      historyRecords = Array.isArray(records) ? records.slice(0, 10) : [];
      renderHistory();
    }

    function renderHistory() {
      historyListEl.innerHTML = "";

      if (!historyRecords.length) {
        const item = document.createElement("li");
        item.className = "history-empty";
        item.textContent = "尚無查詢紀錄。";
        historyListEl.appendChild(item);
        return;
      }

      historyRecords.slice(0, 10).forEach((record, index) => {
        const item = document.createElement("li");
        item.className = "history-item";

        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-button";
        button.innerHTML = `
          <span>${index + 1}. ${escapeHtml(truncateText(record.question || record.consultationText || "", 20))}</span>
          <small>${formatAskedAt(record.askedAt)} | ${formatDuration(record.executionSeconds)}</small>
        `;
        button.addEventListener("click", () => {
          applyHistoryRecord(record, index);
        });

        item.appendChild(button);
        historyListEl.appendChild(item);
      });
    }

    function applyHistoryRecord(record, activeIndex = 0) {
      if (!record || typeof record !== "object") {
        return;
      }

      const selectedQuestion = record.question || record.consultationText || "";
      const selectedReply = record.reply || record.responseText || "";
      questionInput.value = selectedQuestion || defaultQuestion;
      renderReply(selectedReply || defaultReply);
      setTimer(record.executionSeconds);
      setActiveHistoryButton(activeIndex);
    }

    function setActiveHistoryButton(activeIndex) {
      document.querySelectorAll(".history-button.active").forEach((activeButton) => {
        activeButton.classList.remove("active");
      });

      const buttons = historyListEl.querySelectorAll(".history-button");
      const targetButton = buttons[activeIndex];
      if (targetButton) {
        targetButton.classList.add("active");
      }
    }

    function truncateText(text, maxLength) {
      const normalizedText = String(text).replace(/\s+/g, " ").trim();
      return normalizedText.length > maxLength
        ? normalizedText.slice(0, maxLength) + "..."
        : normalizedText || "(無問診資訊)";
    }

    async function loadDoctorHistory(doctorName) {
      try {
        const response = await fetch(`${appApiBaseUrl}/history?doctorName=${encodeURIComponent(doctorName)}`);
        const data = await response.json();
        updateHistoryRecords(data.history);
        if (Array.isArray(data.history) && data.history.length) {
          applyHistoryRecord(data.history[0], 0);
        } else {
          questionInput.value = defaultQuestion;
          renderReply(defaultReply);
          timerEl.textContent = "0.0 秒";
        }
      } catch (_error) {
        historyRecords = [];
        renderHistory();
        questionInput.value = defaultQuestion;
        renderReply(defaultReply);
        timerEl.textContent = "0.0 秒";
      }
    }

    function setTimer(seconds) {
      if (typeof seconds === "number" && Number.isFinite(seconds)) {
        fixedTimerSeconds = seconds;
        timerEl.textContent = `${seconds.toFixed(1)} 秒`;
      }
    }

    function formatDuration(seconds) {
      const value = Number(seconds);
      return Number.isFinite(value) ? `${value.toFixed(1)} 秒` : "-";
    }

    function formatAskedAt(value) {
      if (!value) {
        return "-";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "-";
      }

      return date.toLocaleString("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    if (doctorNameInput.value.trim()) {
      loadDoctorHistory(doctorNameInput.value.trim());
    }

    renderReply(defaultReply);
  </script>
</body>

</html>
